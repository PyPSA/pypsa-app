name: Docker Release

on:
  push:
    branches:
    - main
    tags:
    - "v*"
  workflow_dispatch:

permissions: {}

env:
  REGISTRY: ghcr.io
  FULL_IMAGE_NAME: ghcr.io/pypsa/pypsa-app

jobs:
  push-image:
    name: Build and push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      with:
        fetch-depth: 0    # Fetch tags for setuptools_scm

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3.12.0

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata for Docker
      id: meta
      uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051  # v5.10.0
      with:
        images: ${{ env.FULL_IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=tag
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix=
          type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
          type=raw,value=${{ github.event.repository.default_branch }},enable=${{ startsWith(github.ref, 'refs/tags/v') }}

    - name: Build and push Docker image
      uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25  # v5.4.0
      with:
        context: .
        file: ./Dockerfile
        target: full
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        provenance: mode=max
        sbom: true

  wait-for-deploy:
    name: Wait for dev deploy
    runs-on: ubuntu-latest
    needs: push-image
    if: github.ref == 'refs/heads/main'
    environment:
      name: dev
      url: ${{ vars.APP_URL }}

    steps:
    - name: Poll /api/v1/version for new short SHA
      env:
        TARGET_SHA: ${{ github.sha }}
        APP_URL: ${{ vars.APP_URL }}
        CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID_DEPLOY }}
        CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET_DEPLOY }}
      run: |
        set -eu
        SHORT="${TARGET_SHA:0:7}"
        for i in $(seq 1 80); do
          ver=$(curl -sS \
            -H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" \
            -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" \
            "$APP_URL/api/v1/version/" | jq -r '.version // empty' 2>/dev/null || true)
          if [[ "$ver" == *"g${SHORT}"* ]]; then
            echo "Deployed: $ver"
            exit 0
          fi
          echo "want g${SHORT}, got ${ver:-<none>}"
          sleep 15
        done
        exit 1
