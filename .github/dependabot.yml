version: 2
updates:
- package-ecosystem: "github-actions"
  directory: "/"
  schedule:
    interval: "weekly"
  cooldown:
    default-days: 7
  groups:
    github-actions:
      patterns: ["*"]
      update-types: ["minor", "patch"]

- package-ecosystem: "uv"
  directory: "/"
  schedule:
    interval: "weekly"
  cooldown:
    default-days: 7
    semver-major-days: 14
  groups:
    python:
      patterns: ["*"]
      update-types: ["minor", "patch"]

- package-ecosystem: "docker"
  directory: "/"
  schedule:
    interval: "weekly"
  cooldown:
    default-days: 7
  groups:
    docker:
      patterns: ["*"]
      update-types: ["minor", "patch"]
