version: 2
updates:
- package-ecosystem: "github-actions"
  directory: "/"
  schedule:
    interval: "weekly"
  cooldown:
    default-days: 7

- package-ecosystem: "uv"
  directory: "/"
  schedule:
    interval: "weekly"
  cooldown:
    default-days: 7
    semver-major-days: 14

- package-ecosystem: "npm"
  directory: "/frontend/app"
  schedule:
    interval: "weekly"
  cooldown:
    default-days: 7
    semver-major-days: 14

- package-ecosystem: "docker"
  directory: "/"
  schedule:
    interval: "weekly"
  cooldown:
    default-days: 7
